{% extends 'sales/base.html' %}

{% block title %}Delete Expense{% endblock %}
{% block header %}Delete Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-body">
                <h5>Delete {{ object.expense_number }}?</h5>
                <p class="text-muted">This will remove the expense record permanently.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'finance:expense-detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
