  <text x="100" y="394" fill="#10233D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Profit and Loss Inputs</text>
  <text x="100" y="428" fill="#4B627B" font-family="Arial, Helvetica, sans-serif" font-size="18">Invoices + Receipts + Expenses = revenue, cash flow, and profitability insight</text>
  <text x="100" y="456" fill="#4B627B" font-family="Arial, Helvetica, sans-serif" font-size="18">Includes cash basis, accrual basis, expense categories, and date-range filters</text>

